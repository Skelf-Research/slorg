site_name: LORG Documentation
site_description: The search engine that thinks before it searches. AI-powered search with knowledge graph generation.
site_author: Dipankar Sarkar
site_url: https://docs.skelfresearch.com/slorg

repo_name: skelf-research/slorg
repo_url: https://github.com/skelf-research/slorg

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - CLI Usage: user-guide/cli-usage.md
    - Server Mode: user-guide/server-mode.md
    - Library Usage: user-guide/library-usage.md
    - Web Interface: user-guide/web-interface.md
  - API Reference:
    - LorgSearch Class: api-reference/lorg-search.md
    - Server API: api-reference/server.md
    - Configuration Options: api-reference/configuration.md
  - Architecture:
    - Overview: architecture/overview.md
    - Data Flow: architecture/data-flow.md
    - Components: architecture/components.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - tables

plugins:
  - search
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/skelf-research/slorg
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/lorg
  generator: false
